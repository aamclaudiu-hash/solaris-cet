name: Mark stale issues and PRs

# Runs daily and labels issues/PRs that have had no activity for 60 days as
# "stale", then closes them after a further 14 days of silence.
#
# Pinned issues and PRs with the "pinned", "security", or "keep-open" label are
# never marked stale.

on:
  schedule:
    - cron: "0 6 * * *" # 06:00 UTC every day
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Close stale issues and PRs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # ── Issues ────────────────────────────────────────────────────────
          days-before-issue-stale: 60
          days-before-issue-close: 14
          stale-issue-label: "stale"
          stale-issue-message: >
            👋 This issue has been automatically marked as **stale** because it
            has not had any activity in the past 60 days.
            It will be closed in 14 days unless there is new activity.
            If this is still relevant, please leave a comment or remove the
            `stale` label to keep it open. Thank you for contributing! 🙏
          close-issue-message: >
            🔒 This issue has been automatically closed due to inactivity.
            If you believe it is still relevant, feel free to reopen it with
            updated context.

          # ── Pull Requests ─────────────────────────────────────────────────
          days-before-pr-stale: 30
          days-before-pr-close: 7
          stale-pr-label: "stale"
          stale-pr-message: >
            👋 This pull request has been automatically marked as **stale**
            because it has not had any activity in the past 30 days.
            It will be closed in 7 days unless there is new activity.
            Please push a new commit, respond to review comments, or remove
            the `stale` label to keep it open.
          close-pr-message: >
            🔒 This pull request has been automatically closed due to
            inactivity. Feel free to reopen it if you'd like to continue.

          # ── Exemptions ────────────────────────────────────────────────────
          exempt-issue-labels: "pinned,security,keep-open,bug,enhancement"
          exempt-pr-labels: "pinned,security,keep-open,dependencies"
          exempt-all-milestones: true
