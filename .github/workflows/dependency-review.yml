name: Dependency Review

# Runs on every pull request to inspect added / changed npm dependencies
# against the GitHub Advisory Database. Fails if any dependency introduces
# a vulnerability rated HIGH or CRITICAL.
#
# This workflow is free for all public repositories (GitHub Advanced Security
# is included at no charge for public repos).

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # Block merge if HIGH or CRITICAL vulnerabilities are introduced
          fail-on-severity: high
          # Post a summary comment on the PR with a full vulnerability report
          comment-summary-in-pr: always
          # Deny any dependency with a known license incompatible with this project
          deny-licenses: GPL-2.0, GPL-3.0, LGPL-2.0, LGPL-2.1, LGPL-3.0
