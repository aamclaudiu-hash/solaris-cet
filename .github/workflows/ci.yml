name: CI — Continuous Integration

# Run on every pull request targeting `main` and on direct pushes to `main`.
# Implements a multi-stage quality gate:
#   Stage 1 (parallel): Lint & type-check  +  Security audit
#   Stage 2:            Build application  (only when Stage 1 passes)
#   Stage 3:            E2E tests          (only when Stage 2 passes)
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

# Cancel in-progress runs for the same ref to save compute on rapid pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Stage 1a: Lint & Type-check ──────────────────────────────────────────
  lint-typecheck:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Run ESLint
        working-directory: app
        run: npm run lint

      - name: TypeScript type-check
        working-directory: app
        run: npx tsc --noEmit

  # ── Stage 1b: Security audit (runs in parallel with lint-typecheck) ──────
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Audit dependencies for critical vulnerabilities
        working-directory: app
        run: npm audit --audit-level=critical

  # ── Stage 2: Build (only after all Stage 1 gates pass) ───────────────────
  build:
    name: Build application
    runs-on: ubuntu-latest
    needs: [lint-typecheck, security-audit]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      # Cache Vite's intermediate build artifacts to speed up incremental builds.
      - name: Restore Vite build cache
        uses: actions/cache@v4
        with:
          path: app/node_modules/.vite
          key: vite-${{ runner.os }}-${{ hashFiles('app/package-lock.json') }}
          restore-keys: |
            vite-${{ runner.os }}-

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Build application
        working-directory: app
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: ci-dist-${{ github.run_id }}
          path: app/dist
          retention-days: 1

  # ── Stage 3: E2E tests (only after the build passes) ─────────────────────
  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      # Cache Playwright browser binaries so successive runs skip the large download.
      - name: Restore Playwright browser cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('app/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Install Playwright browsers
        working-directory: app
        run: npx playwright install --with-deps chromium

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: ci-dist-${{ github.run_id }}
          path: app/dist

      - name: Run E2E tests
        working-directory: app
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: app/playwright-report
          retention-days: 30
          if-no-files-found: warn
