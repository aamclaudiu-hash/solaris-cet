name: CI — Quality Gate

# Runs on every pull request targeting `main` and on direct pushes to `main`.
# Enforces the quality barrier: lint + unit-tests must both pass (in parallel)
# before the build is allowed to proceed. E2E tests run against the built
# artefact, simulating real user behaviour in a headless Chromium browser.
#
# Pipeline timing model (see WHITEPAPER §CI):
#   T_total = T_init + T_cache_download
#             + max(T_static_analysis, T_unit_tests)
#             + T_compile
#             - ΔT_cache_optimisation

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Stage 1a (parallel): Static analysis ──────────────────────────────────
  lint:
    name: Static Analysis (ESLint + TypeScript)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high --omit=dev

      - name: Run ESLint
        run: npm run lint --workspace=app

      - name: TypeScript type-check
        run: npm run typecheck --workspace=app

      - name: API type-check
        run: npm run api:typecheck

      - name: Scripts type-check
        run: npm run scripts:typecheck

  # ── Stage 1b (parallel): Unit tests ───────────────────────────────────────
  unit-test:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:coverage --workspace=app

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: app/coverage
          retention-days: 7
          if-no-files-found: warn

  contracts:
    name: Contracts (Tact build + tests)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Contracts tests
        run: npm run contracts:test

      - name: Contracts type-check
        run: npm run contracts:typecheck

  # ── Stage 2: Build (waits for all quality gates) ──────────────────────────
  # Note: `npm audit --audit-level=high` already runs in the lint job above.
  build:
    name: Build application
    runs-on: ubuntu-latest
    needs: [lint, unit-test, contracts]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build --workspace=app

      # Immutable performance budget (main entry chunk). Raise only with explicit review — production UX depends on it.
      - name: Check main bundle size budget
        working-directory: app
        run: |
          set -e
          MAIN=$(ls dist/assets/index-*.js 2>/dev/null | head -1)
          if [ -z "$MAIN" ]; then
            echo "::error::No dist/assets/index-*.js chunk found"
            exit 1
          fi
          SIZE=$(gzip -c "$MAIN" | wc -c | tr -d ' ')
          MAX=250000
          echo "Main chunk (gzip): $MAIN size=${SIZE} bytes (budget max ${MAX})"
          if [ "$SIZE" -gt "$MAX" ]; then
            echo "::error::Main bundle exceeds ${MAX} byte budget"
            exit 1
          fi

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ github.sha }}
          path: app/dist
          retention-days: 1

  # ── Stage 3: E2E tests (waits for build) ──────────────────────────────────
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        working-directory: app
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        working-directory: app
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: app/dist

      - name: Run Playwright E2E tests
        run: npm run app:test:e2e:stable

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: app/playwright-report
          retention-days: 30
          if-no-files-found: warn
