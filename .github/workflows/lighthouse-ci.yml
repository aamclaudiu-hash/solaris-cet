name: Lighthouse CI — Quality Gate

# Run on every pull request targeting `main`.
# Blocks merge if Performance, Accessibility, Best Practices, or SEO fall below thresholds.
on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: lighthouse-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── 1. Build ──────────────────────────────────────────────────────────────
  build:
    name: Build app for audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Guard robots baseline
        run: |
          test -f app/public/robots.txt
          grep -Eq '^Sitemap:\s+https://solaris-cet\.com/sitemap\.xml$' app/public/robots.txt
          if grep -Eq '^Disallow:\s*/\s*$' app/public/robots.txt; then
            echo "robots.txt blocks all crawling (Disallow: /)."
            exit 1
          fi

      - name: Build application
        run: npm run build --workspace=app

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: app/dist
          retention-days: 1

  # ── 2. Lighthouse CI ──────────────────────────────────────────────────────
  lighthouse:
    name: Lighthouse audit (quality gate — static dist)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build application (audit)
        env:
          VITE_LHCI: "1"
        run: npm run build --workspace=app

      - name: Write canonical Lighthouse config
        # Overwrite whatever lighthouserc.cjs was checked out from the PR branch
        # with the definitive thresholds from main, so that old branches with
        # higher thresholds (e.g. 0.80, 0.90) can no longer block the audit.
        working-directory: app
        run: |
          cat > lighthouserc.cjs << 'EOF'
          module.exports = {
            ci: {
              collect: {
                staticDistDir: './dist',
                numberOfRuns: 1,
                settings: {
                  preset: 'desktop',
                  throttlingMethod: 'simulate',
                  chromeFlags: [
                    '--no-sandbox',
                    '--disable-dev-shm-usage',
                    '--disable-gpu',
                  ],
                  onlyCategories: ['performance', 'accessibility', 'best-practices', 'seo'],
                },
              },
              assert: {
                assertions: {
                  'categories:performance':    ['error', { minScore: 0.65 }],
                  'categories:accessibility':  ['error', { minScore: 0.8 }],
                  'categories:best-practices': ['error', { minScore: 0.65 }],
                  'categories:seo':            ['error', { minScore: 0.8 }],
                  'document-title':  'error',
                  'html-has-lang':   'error',
                  'image-alt':       'error',
                  'meta-description':'error',
                  'color-contrast':  'warn',
                  'link-name':       'warn',
                  'canonical':       'warn',
                  'robots-txt':      'off',
                  'csp-xss':         'warn',
                  'is-on-https':     'warn',
                  'render-blocking-resources': 'warn',
                  'uses-text-compression':     'warn',
                  'uses-responsive-images':    'warn',
                  'efficient-animated-content':'warn',
                  'unused-javascript':         'warn',
                  'unused-css-rules':          'warn',
                  'total-blocking-time':       ['warn', { maxNumericValue: 300 }],
                  'cumulative-layout-shift':   ['warn', { maxNumericValue: 0.1 }],
                  'first-contentful-paint':    ['warn', { maxNumericValue: 2000 }],
                  'largest-contentful-paint':  ['warn', { maxNumericValue: 2500 }],
                  'errors-in-console':         'warn',
                },
              },
              upload: {
                target: 'filesystem',
                outputDir: '.lighthouseci',
              },
            },
          };
          EOF

      - name: Run Lighthouse CI
        working-directory: app
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx @lhci/cli@0.15.1 autorun --config=lighthouserc.cjs

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-report
          path: app/.lighthouseci
          retention-days: 30
          if-no-files-found: warn

  # ── 3. E2E Tests ─────────────────────────────────────────────────────────
  e2e:
    name: Playwright E2E tests
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        working-directory: app
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        working-directory: app
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: app/dist

      - name: Run Playwright E2E tests
        run: npm run app:test:e2e:stable

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: app/playwright-report
          retention-days: 30
