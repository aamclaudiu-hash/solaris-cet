name: CodeQL Security Analysis

# Runs on every push / PR targeting main and on a weekly schedule.
# Uses GitHub's free CodeQL engine to detect security vulnerabilities in
# JavaScript / TypeScript source code before they reach production.

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    # Run a full scan every Sunday at 02:00 UTC to catch newly-published CVEs
    # that affect the existing codebase without a code change.
    - cron: "0 2 * * 0"

permissions:
  contents: read
  security-events: write   # Required to upload SARIF results to GitHub

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # Use the security-extended query suite for broader coverage.
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
