name: CodeQL Security Analysis

# Runs CodeQL static analysis on every push to main, every PR targeting main,
# and on a weekly schedule to catch newly-discovered vulnerabilities in
# unchanged code.

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    # Every Monday at 08:00 UTC
    - cron: "0 8 * * 1"

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: CodeQL Analysis (${{ matrix.language }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # Use the default security-extended query suite for broader coverage
          queries: security-extended

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Build application (enables deeper data-flow analysis)
        working-directory: app
        run: npm run build

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
