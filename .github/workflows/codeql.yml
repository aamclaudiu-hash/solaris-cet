name: CodeQL Security Analysis

# Scans JavaScript/TypeScript source code for security vulnerabilities,
# code-quality issues, and common anti-patterns using GitHub's free
# CodeQL engine (GitHub Advanced Security).
#
# Runs on:
#  - Every push to `main`
#  - Every pull request targeting `main`
#  - Weekly on Sunday at 02:00 UTC (scheduled deep scan)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 2 * * 0"

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          # Only scan application source — skip generated files and dependencies
          config: |
            paths:
              - app/src
              - app/api
              - scripts
              - contracts
            paths-ignore:
              - app/node_modules
              - app/dist
              - contracts/node_modules
              - contracts/build

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"
