name: CodeQL SAST

# Static Application Security Testing via GitHub's CodeQL engine.
# Scans for data-flow vulnerabilities, XSS patterns, and other insecure
# code patterns in the TypeScript/JavaScript source.
#
# Runs on:
#   - Every push to `main`
#   - Every pull request targeting `main`
#   - Weekly schedule (Sunday 03:00 UTC) for catch-up scans

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze (JavaScript / TypeScript)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"
