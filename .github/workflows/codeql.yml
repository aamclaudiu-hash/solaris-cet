name: CodeQL Security Analysis

# Scans JavaScript/TypeScript source for security vulnerabilities using GitHub's
# CodeQL engine (GitHub Advanced Security — free for public repositories).
#
# Runs on every push and pull request targeting `main`, and on a weekly
# schedule to catch newly-published CVEs in previously-clean code.

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    # Run every Monday at 08:00 UTC
    - cron: "0 8 * * 1"

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze (JavaScript / TypeScript)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Initialise CodeQL tools for the JavaScript/TypeScript language pack.
      # This also sets up a code-scanning database that the subsequent
      # auto-build step populates.
      - name: Initialise CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          # Use the security-extended query suite for broader coverage beyond
          # the default set — catches additional CWEs without requiring a paid
          # GHAS licence on public repos.
          queries: security-extended

      # CodeQL can auto-build JavaScript/TypeScript projects without explicit
      # build commands.  The autobuild step is included here for completeness
      # and future-proofing (e.g. if native modules are added later).
      - name: Auto-build
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"
