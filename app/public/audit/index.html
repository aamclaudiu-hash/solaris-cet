<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Solaris CET — Audit Report</title>
    <meta
      name="description"
      content="Solaris CET security and UX audit report pointer (static, no-JS)."
    />
    <meta name="robots" content="index, follow" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <link rel="canonical" href="https://solaris-cet.com/audit/" />
    <style>
      :root {
        --bg: #020617;
        --panel: rgba(255, 255, 255, 0.05);
        --border: rgba(255, 255, 255, 0.12);
        --text: #f8fafc;
        --muted: #94a3b8;
        --gold: #f2c94c;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, sans-serif;
        line-height: 1.6;
      }
      main {
        max-width: 52rem;
        margin: 0 auto;
        padding: 2rem 1.25rem 3rem;
      }
      .panel {
        border: 1px solid var(--border);
        background: var(--panel);
        border-radius: 14px;
        padding: 1.25rem 1.25rem 1.1rem;
      }
      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.6rem;
        letter-spacing: -0.02em;
      }
      p {
        margin: 0.6rem 0;
        color: var(--muted);
      }
      a {
        color: var(--gold);
        font-weight: 650;
        text-decoration: underline;
        text-underline-offset: 3px;
      }
      a:focus-visible {
        outline: 2px solid var(--gold);
        outline-offset: 2px;
      }
      .meta {
        margin-top: 0.9rem;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono",
          "Courier New", monospace;
        font-size: 0.78rem;
        color: rgba(148, 163, 184, 0.92);
      }
      .actions {
        margin-top: 1rem;
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 12px;
        padding: 0.75rem 1rem;
        border: 1px solid rgba(242, 201, 76, 0.3);
        background: rgba(242, 201, 76, 0.08);
        text-decoration: none;
      }
      .btn-secondary {
        border-color: rgba(255, 255, 255, 0.14);
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="panel">
        <h1>Solaris CET — Audit Report</h1>
        <p>
          This is a static pointer page. The full audit report is published in the public repository.
        </p>
        <div class="actions">
          <a
            class="btn"
            href="https://raw.githubusercontent.com/Solaris-CET/solaris-cet/main/AUDIT_REPORT_2026-03-31.md"
            target="_blank"
            rel="noopener noreferrer"
          >
            Open audit report (raw Markdown)
          </a>
          <a class="btn btn-secondary" href="/sovereign/">Open sovereign surface</a>
        </div>
        <div class="meta">Path: /audit/ · Format: markdown pointer · No JavaScript required</div>
      </div>
    </main>
  </body>
</html>
