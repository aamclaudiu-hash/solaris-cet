<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#020617" />
    <meta
      name="description"
      content="Solaris CET offline surface. When the app is unavailable, access the sovereign static node for CET supply facts and project anchors."
    />
    <title>Offline — Solaris CET</title>
    <style>
      :root {
        --void: #020617;
        --gold: #f2c94c;
        --muted: #94a3b8;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--void);
        color: #f8fafc;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        text-align: center;
      }
      .panel {
        max-width: 26rem;
        padding: 2rem;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 1rem;
        background: rgba(255, 255, 255, 0.04);
      }
      h1 {
        font-family: ui-monospace, monospace;
        font-size: 0.7rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--gold);
        margin: 0 0 0.75rem;
      }
      p {
        margin: 0 0 1rem;
        color: var(--muted);
        line-height: 1.5;
        font-size: 0.95rem;
      }
      a {
        color: var(--gold);
        text-decoration: none;
        border-bottom: 1px solid rgba(242, 201, 76, 0.35);
      }
      a:hover {
        border-bottom-color: var(--gold);
      }
      .mono {
        font-family: ui-monospace, monospace;
        font-size: 0.8rem;
        color: #f8fafc;
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <h1>Network unavailable</h1>
      <p class="mono">Solaris CET</p>
      <p>
        The app shell may not load while offline. You can still open the static
        <strong>OMEGA</strong> surface (no JavaScript) for CET supply facts.
      </p>
      <p>
        <a href="/sovereign/">/sovereign/</a>
      </p>
    </div>
  </body>
</html>
