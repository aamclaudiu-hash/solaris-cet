    <!--
      Context-aware boot: after deferred scripts (e.g. telegram-web-app.js), mark TMA host for CSS/telemetry policy.
      DOMContentLoaded runs after deferred scripts; do not read Telegram.WebApp synchronously at parse time.
    -->
    <script>
      document.addEventListener(
        "DOMContentLoaded",
        function () {
          try {
            var wa = window.Telegram && window.Telegram.WebApp;
            if (!wa) return;
            document.documentElement.classList.add("tma-host");
            document.documentElement.setAttribute("data-tma", "1");
            if (typeof wa.ready === "function") wa.ready();
          } catch (_) {}
        },
        { once: true },
      );
