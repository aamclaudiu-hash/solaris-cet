<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; font-src 'self'"

    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />

    <title>Solaris CET — Whitepaper (Sovereign)</title>
    <style>
      :root {
        --gold: #f2c94c;
        --bg: #020617;
        --panel: rgba(255, 255, 255, 0.05);
        --border: rgba(255, 255, 255, 0.12);
        --text: #f8fafc;
        --muted: #cbd5e1;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, sans-serif;
        line-height: 1.6;
      }
      main {
        max-width: 56rem;
        margin: 0 auto;
        padding: 2rem 1.25rem 3rem;
      }
      .panel {
        border: 1px solid var(--border);
        background: var(--panel);
        border-radius: 14px;
        padding: 1.25rem 1.25rem 1.1rem;
      }
      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.6rem;
        letter-spacing: -0.02em;
      }
      p {
        margin: 0.6rem 0;
        color: var(--muted);
      }
      a {
        color: var(--gold);
        font-weight: 650;
        text-decoration: underline;
        text-underline-offset: 3px;
      }
      a:focus-visible {
        outline: 2px solid var(--gold);
        outline-offset: 2px;
      }
      .actions {
        margin-top: 1rem;
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 12px;
        padding: 0.75rem 1rem;
        border: 1px solid rgba(242, 201, 76, 0.3);
        background: rgba(242, 201, 76, 0.08);
        text-decoration: none;
      }
      .btn-secondary {
        border-color: rgba(255, 255, 255, 0.14);
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
      }
      .meta {
        margin-top: 0.9rem;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono",
          "Courier New", monospace;
        font-size: 0.78rem;
        color: rgba(203, 213, 225, 0.88);
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="panel">

          Sovereign (no-JS) surface. Use the redirect route for the current primary gateway, or open a

        </p>
        <div class="actions">
          <a class="btn" href="/whitepaper">Open /whitepaper redirect</a>
          <a
            class="btn btn-secondary"
            href="https://dweb.link/ipfs/bafkreieggm2l7favvjw4amybbobastjo6kcrdi33gzcvtzrur5opoivd3a"
            target="_blank"
            rel="noopener noreferrer"

            Open via dweb.link

          <a class="btn btn-secondary" href="/sovereign/">Back to sovereign index</a>
          <a class="btn btn-secondary" href="/">Back to interactive app</a>
        </div>
        <div class="meta">
          CID: bafkreieggm2l7favvjw4amybbobastjo6kcrdi33gzcvtzrur5opoivd3a
        </div>
      </div>
    </main>

</html>
