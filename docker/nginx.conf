# SPA static host — pair with a Vite `dist` root at /usr/share/nginx/html
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Security headers (CSP is delivered via <meta> in app/index.html — do not duplicate here;
    # a second CSP would stack/intersect with the HTML policy and can break TonConnect / APIs.)
    # HSTS: set here when this nginx terminates TLS; if TLS is at Cloudflare/Coolify edge, mirror there too
    # and submit https://hstspreload.org/?domain=solaris-cet.com after HTTPS + redirect checks pass.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;

    # Sovereign surface must be served as static subtree, not SPA-rewritten.
    location ^~ /sovereign/ {
        try_files $uri $uri/ /sovereign/index.html;
    }

    # Text-only emergency surface (HTML 2.0-style; no SPA fallback).
    location ^~ /apocalypse/ {
        try_files $uri $uri/ /apocalypse/index.html;
        default_type text/html;
        charset utf-8;
        gzip off;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Serve root-level branding/PWA assets directly.
    location = /health.json {
        try_files $uri =404;
        default_type application/json;
        add_header Cache-Control "no-store" always;
    }
    location = /manifest.json { try_files $uri =404; }
    location = /favicon.svg { try_files $uri =404; }
    location = /favicon-16x16.png { try_files $uri =404; }
    location = /favicon-32x32.png { try_files $uri =404; }
    location = /apple-touch-icon.png { try_files $uri =404; }
    location = /safari-pinned-tab.svg { try_files $uri =404; }

    # Self-hosted font endpoint used by app CSS.
    location ^~ /fonts/ {
        try_files $uri =404;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ONNX Runtime Web: WASM, workers, and loaders — never SPA-fallback to index.html.
    # (Prefix ^~ wins over regex; try_files $uri only — missing assets → 404, not HTML.)
    location ^~ /vendor/onnxruntime/ {
        try_files $uri =404;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite emits content-hashed filenames — long cache is safe.
    # Includes wasm/mjs/map and optional bin/ort for ONNX / future binary assets.
    location ~* \.(?:js|mjs|css|wasm|map|bin|ort|png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
        try_files $uri =404;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }
}
