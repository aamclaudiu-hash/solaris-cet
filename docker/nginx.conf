# SPA static host — pair with a Vite `dist` root at /usr/share/nginx/html
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Security headers (CSP is delivered via <meta> in app/index.html — do not duplicate here;
    # a second CSP would stack/intersect with the HTML policy and can break TonConnect / APIs.)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # Sovereign surface must be served as static subtree, not SPA-rewritten.
    location ^~ /sovereign/ {
        try_files $uri $uri/ /sovereign/index.html;
    }

    # Serve root-level branding/PWA assets directly.
    location = /manifest.json { try_files $uri =404; }
    location = /favicon.svg { try_files $uri =404; }
    location = /favicon-16x16.png { try_files $uri =404; }
    location = /favicon-32x32.png { try_files $uri =404; }
    location = /apple-touch-icon.png { try_files $uri =404; }
    location = /safari-pinned-tab.svg { try_files $uri =404; }

    # Self-hosted font endpoint used by app CSS.
    location ^~ /fonts/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }
}
