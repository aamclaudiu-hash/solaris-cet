services:
  frontend:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      - VITE_PUBLIC_SITE_URL=${VITE_PUBLIC_SITE_URL}
      - VITE_GOOGLE_SITE_VERIFICATION=${VITE_GOOGLE_SITE_VERIFICATION}
      - VITE_GIT_COMMIT_HASH=${VITE_GIT_COMMIT_HASH}
      - VITE_BUILD_TIMESTAMP=${VITE_BUILD_TIMESTAMP}
      - GROK_API_KEY=${GROK_API_KEY}
      - GROK_API_KEY_ENC=${GROK_API_KEY_ENC}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_API_KEY_ENC=${GEMINI_API_KEY_ENC}
      - ENCRYPTION_SECRET=${ENCRYPTION_SECRET}
      - CET_AI_ENABLE_WEB=${CET_AI_ENABLE_WEB}
      - CET_AI_WEB_ALLOWLIST=${CET_AI_WEB_ALLOWLIST}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - TAVILY_API_KEY_ENC=${TAVILY_API_KEY_ENC}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_SECRETS=${JWT_SECRETS}
      - DATABASE_URL=${DATABASE_URL}
      - TONCENTER_RPC_URL=${TONCENTER_RPC_URL}
      - TONCENTER_API_KEY=${TONCENTER_API_KEY}
      - UPSTASH_REDIS_REST_URL=${UPSTASH_REDIS_REST_URL}
      - UPSTASH_REDIS_REST_TOKEN=${UPSTASH_REDIS_REST_TOKEN}
      - VITE_UX_TEST_SRC=${VITE_UX_TEST_SRC}
      - METRICS_TOKEN=${METRICS_TOKEN}
      - SENTRY_DSN=${SENTRY_DSN}
      - SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT}
      - SENTRY_TRACES_SAMPLE_RATE=${SENTRY_TRACES_SAMPLE_RATE}
      - WAITLIST_WEBHOOK_URL=${WAITLIST_WEBHOOK_URL}
      - PORT=${PORT:-3000}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "const port=process.env.PORT||3000;fetch('http://127.0.0.1:'+port+'/health.json',{cache:'no-store'}).then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3
